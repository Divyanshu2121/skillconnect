{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <div class="max-w-md mx-auto">

    <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
            <p class="text-gray-600">Sign in to your account</p>
        </div>
        <form method="POST" action="/login" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="Enter your email">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="Enter your password">
            </div>
            <button type="submit" class="w-full bg-primary text-white py-3 px-6 rounded-xl hover:bg-blue-600 focus:ring-4 focus:ring-blue-200 font-semibold transition-all shadow-lg">Login</button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-600">
            Don't have an account? <a href="/signup" class="text-primary hover:underline font-medium">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}

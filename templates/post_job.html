{% extends "base.html" %}

{% block title %}Post Job{% endblock %}

{% block content %}
    <div class="max-w-lg mx-auto">

    <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Post a New Job</h1>
            <p class="text-gray-600">Fill in the details below</p>
        </div>
        <form method="POST" action="/post_job" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Job Title</label>
                <input type="text" name="title" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="e.g. Software Engineer">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Company</label>
                <input type="text" name="company" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="Your company name">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                <input type="text" name="location" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="e.g. New York, NY">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Salary</label>
                <input type="number" name="salary" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="e.g. 80000">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                <input type="text" name="category" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="e.g. Software Development">
            </div>
            <button type="submit" class="w-full bg-secondary text-white py-3 px-6 rounded-xl hover:bg-emerald-600 focus:ring-4 focus:ring-emerald-200 font-semibold transition-all shadow-lg">Post Job</button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-600">
            <a href="/dashboard" class="text-primary hover:underline font-medium">← Back to Dashboard</a>
        </p>
    </div>
</div>
{% endblock %}
